<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Eksperimen perbandingan performa JavaScript vs WebAssembly — benchmark CPU-heavy di browser." />
  <title>JS vs WebAssembly — Benchmark</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ══ TOP BAR ════════════════════════════════════════════════════ -->
<header class="topbar">
  <div class="topbar-left">
    <div class="topbar-badge">
      <span class="pulse-dot"></span>
      Performance Experiment
    </div>
    <h1>
      <span class="tag-js">JavaScript</span>
      <span class="vs">vs</span>
      <span class="tag-wasm">WebAssembly</span>
    </h1>
  </div>

  <div class="topbar-center">
    <!-- Config: Jenis Benchmark -->
    <div class="config-item">
      <label for="benchmark-select">Benchmark</label>
      <select id="benchmark-select">
        <option value="factorial">Factorial</option>
        <option value="fibonacci" selected>Fibonacci</option>
        <option value="math_loop">Heavy Math</option>
      </select>
    </div>

    <!-- Config: Intensitas -->
    <div class="config-item">
      <label for="intensity-select">Intensitas</label>
      <select id="intensity-select"></select>
    </div>
  </div>

  <div class="topbar-right">
    <button id="btn-run-js" class="btn btn-js">
      ▶ Run JS
    </button>
    <button id="btn-run-wasm" class="btn btn-wasm" disabled>
      ▶ Run WASM
      <span id="wasm-status" class="wasm-pill">Memuat…</span>
    </button>
    <button id="btn-run-all" class="btn btn-all" disabled>
      ▶▶ Run All
    </button>
    <button id="btn-reset" class="btn btn-reset">↺</button>
  </div>
</header>

<!-- ══ MAIN PANELS ════════════════════════════════════════════════ -->
<main class="panels">

  <!-- Panel 1: JavaScript Result -->
  <div class="panel panel-js" id="js-card" role="region" aria-label="Hasil JavaScript">
    <div class="panel-header">
      <span class="dot dot-js"></span>
      <span class="panel-title">JavaScript</span>
      <span class="winner-badge" id="js-winner">Winner</span>
    </div>
    <div class="panel-time" id="js-time">—</div>
    <div class="panel-meta" id="js-meta">Belum dijalankan</div>
    <div class="progress-wrap">
      <div class="progress-bar" id="js-progress"></div>
    </div>
  </div>

  <!-- Panel 2: WebAssembly Result -->
  <div class="panel panel-wasm" id="wasm-card" role="region" aria-label="Hasil WebAssembly">
    <div class="panel-header">
      <span class="dot dot-wasm"></span>
      <span class="panel-title">WebAssembly</span>
      <span class="winner-badge" id="wasm-winner">Winner</span>
    </div>
    <div class="panel-time" id="wasm-time">—</div>
    <div class="panel-meta" id="wasm-meta">Belum dijalankan</div>
    <div class="progress-wrap">
      <div class="progress-bar" id="wasm-progress"></div>
    </div>
  </div>

  <!-- Panel 3: Perbandingan -->
  <div class="panel panel-compare" id="comparison-card" role="region" aria-label="Perbandingan">
    <div class="panel-header">
      <span class="panel-title">Perbandingan</span>
    </div>
    <div id="comparison-body" class="compare-body">
      <span class="muted">Jalankan kedua benchmark terlebih dahulu.</span>
    </div>
  </div>

  <!-- Panel 4: Log -->
  <div class="panel panel-log">
    <div class="panel-header">
      <span class="panel-title">Log</span>
    </div>
    <div class="log-area" id="log-area" role="log" aria-live="polite"></div>
  </div>

</main>

<script src="script.js"></script>
</body>
</html>
